name: Cleanup Old News

on:
  schedule:
    - cron: '0 3 * * 0'  # Domingo às 3h UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Dias para manter (padrão: 7)'
        required: false
        default: '7'

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Cleanup (preserva alto impacto para ML)
        run: |
          DAYS="${{ github.event.inputs.days }}"
          DAYS="${DAYS:-7}"
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]]; then
            echo "Erro: days deve ser um número inteiro positivo"
            exit 1
          fi
          python main_cloud.py cleanup --days "$DAYS"

      - name: Estatísticas após cleanup
        run: python main_cloud.py stats
