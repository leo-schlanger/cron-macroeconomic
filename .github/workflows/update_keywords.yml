name: Update Keywords

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary feedparser python-dateutil requests beautifulsoup4

      - name: Update keywords in database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
from database_supabase import load_keywords_from_json
print('Carregando novas keywords (incluindo filtros de conflitos)...')
load_keywords_from_json()
print('Concluído!')
"
