name: Fetch News Cron

on:
  schedule:
    - cron: '0 * * * *'  # A cada hora
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoria (opcional)'
        required: false
      skip_tests:
        description: 'Pular testes'
        type: boolean
        default: false

concurrency:
  group: fetch-news
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  fetch:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        timeout-minutes: 10
        run: |
          if [ -n "${{ github.event.inputs.category }}" ]; then
            python main_cloud.py fetch --category ${{ github.event.inputs.category }}
          else
            python main_cloud.py fetch
          fi

      - name: Show statistics
        run: python main_cloud.py stats
